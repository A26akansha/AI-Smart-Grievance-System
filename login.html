<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>AI Smart Grievance</h1>

    <p>Login To Continue</p>

    <form method="POST">

        <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <h3>
        {{ message }}
    </h3>

</div>

</body>
</html>
